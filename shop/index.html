<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Quorbz Digital Products</title>
  <meta name="description" content="Instant digital downloads. Printer-friendly. Made for real life. Shop planners, spreadsheets, Notion templates, Canva designs, and more." />
  <script src="/shop/products-data.js?v=3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --purple: #8b5cf6;
      --bg: #060a14;
      --surface: #0b1120;
      --elevated: #111827;
      --border: rgba(255,255,255,0.06);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,10,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 32px;
    }

    .nav-logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent-light), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
      flex: 1;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a.active,
    .nav-links a:hover { color: var(--text-primary); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
    }

    .nav-signin {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-signin:hover { color: var(--text-primary); }

    .cart-btn {
      position: relative;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      color: var(--text-primary);
    }
    .cart-btn:hover { background: #1e2a3a; border-color: rgba(255,255,255,0.12); }

    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }
    .cart-badge.visible { display: flex; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(180deg, #0b1120 0%, var(--bg) 100%);
      padding: 64px 24px 48px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .search-wrap {
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px 13px 46px;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #search-input::placeholder { color: var(--text-muted); }
    #search-input:focus { border-color: var(--accent); }

    /* ── FILTERS ── */
    .filters-bar {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters-bar::-webkit-scrollbar { display: none; }

    .cat-pill {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-pill:hover { border-color: rgba(255,255,255,0.15); color: var(--text-primary); }
    .cat-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .result-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .sort-select {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      outline: none;
      cursor: pointer;
      font-family: inherit;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ── PRODUCT GRID ── */
    .grid-wrap {
      padding: 0 24px 80px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 900px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .product-grid { grid-template-columns: 1fr; }
      nav { padding: 0 16px; gap: 16px; }
      .hero { padding: 40px 16px 32px; }
      .filters-bar { padding: 16px; }
      .toolbar, .grid-wrap { padding-left: 16px; padding-right: 16px; }
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card-thumb {
      height: 160px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px 12px 0 0;
    }
    .card-thumb svg {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .card-badges {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-low { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-med { background: rgba(234,179,8,0.2); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    .badge-high { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge-qw { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-category {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      flex: 1;
    }

    .card-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-light);
    }

    .card-actions {
      padding: 0 16px 16px;
      display: flex;
      gap: 8px;
    }

    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary.added { background: #16a34a; }

    .btn-secondary {
      background: var(--elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: var(--text-primary); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    /* ── CART DRAWER ── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      max-width: 100vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .cart-drawer.open { transform: translateX(0); }

    .cart-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-header h2 { font-size: 18px; font-weight: 700; }

    .cart-close {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .cart-close:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cart-items::-webkit-scrollbar { width: 4px; }
    .cart-items::-webkit-scrollbar-track { background: transparent; }
    .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cart-item {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .cart-item-emoji {
      font-size: 28px;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--surface);
    }

    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cart-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .cart-item-price { font-size: 14px; font-weight: 700; color: var(--accent-light); flex-shrink: 0; }

    .cart-item-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 0;
    }
    .cart-item-remove:hover { color: #f87171; }

    .cart-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
      padding: 40px;
      text-align: center;
    }
    .cart-empty svg { opacity: 0.3; }
    .cart-empty p { font-size: 14px; }

    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cart-totals {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .cart-total-row.grand {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      padding-top: 8px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .btn-checkout {
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-checkout:hover { opacity: 0.92; }
    .btn-checkout:active { transform: scale(0.98); }

    /* ── PICO CHAT ── */
    .pico-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 150;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .pico-panel {
      width: 360px;
      height: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.9) translateY(20px);
      transform-origin: bottom right;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
    }
    .pico-panel.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .pico-head {
      background: linear-gradient(135deg, var(--accent), var(--purple));
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pico-logo {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .pico-head-info { flex: 1; }
    .pico-head-title { font-size: 14px; font-weight: 700; color: #fff; }
    .pico-head-sub { font-size: 11px; color: rgba(255,255,255,0.7); }

    .pico-head-close {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: background 0.2s;
    }
    .pico-head-close:hover { background: rgba(255,255,255,0.25); }

    .pico-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pico-messages::-webkit-scrollbar { width: 3px; }
    .pico-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .pico-msg {
      max-width: 85%;
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .pico-msg.bot {
      background: var(--elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .pico-msg.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .pico-chips {
      padding: 0 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pico-chip {
      padding: 6px 12px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .pico-chip:hover { border-color: var(--accent); color: var(--accent-light); }

    .pico-input-row {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .pico-input {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      font-family: inherit;
    }
    .pico-input::placeholder { color: var(--text-muted); }
    .pico-input:focus { border-color: var(--accent); }

    .pico-send {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .pico-send:hover { background: #2563eb; }

    .pico-btn {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(59,130,246,0.4);
      color: #fff;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .pico-btn:hover { transform: scale(1.05); box-shadow: 0 12px 32px rgba(59,130,246,0.5); }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Quorbz</a>
  <div class="nav-links">
    <a href="/shop/" class="active">Shop</a>
  </div>
  <div class="nav-actions">
    <a href="/signin" class="nav-signin">Sign In</a>
    <button class="cart-btn" onclick="openCart()" aria-label="Cart">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-badge" id="cart-badge"></span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Digital Products That Deliver</h1>
  <p>Instant downloads. Printer-friendly. Made for real life.</p>
  <div class="search-wrap">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search products…" autocomplete="off" />
  </div>
</section>

<!-- CATEGORY FILTERS -->
<div class="filters-bar" id="filters-bar">
  <!-- Pills injected by JS -->
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="result-count" id="result-count"></span>
  <select class="sort-select" id="sort-select">
    <option value="featured">Featured</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="quick-wins">Quick Wins First</option>
  </select>
</div>

<!-- PRODUCT GRID -->
<div class="grid-wrap">
  <div class="product-grid" id="product-grid"></div>
</div>

<!-- CART OVERLAY + DRAWER -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="cart-close" onclick="closeCart()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-totals" id="cart-totals"></div>
    <a href="/shop/checkout.html" class="btn-checkout">Checkout →</a>
  </div>
</div>

<!-- PICO CHAT -->
<div class="pico-wrap">
  <div class="pico-panel" id="pico-panel">
    <div class="pico-head">
      <div class="pico-logo">Q</div>
      <div class="pico-head-info">
        <div class="pico-head-title">Quorbz Support</div>
        <div class="pico-head-sub">Typically replies instantly</div>
      </div>
      <button class="pico-head-close" onclick="toggleChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="pico-messages" id="pico-messages">
      <div class="pico-msg bot">👋 Hi there! How can we help you today?</div>
    </div>
    <div class="pico-chips" id="pico-chips">
      <button class="pico-chip" onclick="picoQuick('Track my order')">Track my order</button>
      <button class="pico-chip" onclick="picoQuick('Product questions')">Product questions</button>
      <button class="pico-chip" onclick="picoQuick('Refund policy')">Refund policy</button>
    </div>
    <div class="pico-input-row">
      <input type="text" class="pico-input" id="pico-input" placeholder="Type a message…" onkeydown="if(event.key==='Enter') picoSend()" />
      <button class="pico-send" onclick="picoSend()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
  <button class="pico-btn" onclick="toggleChat()" aria-label="Chat with support">
    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<script>
// ── CART SYSTEM ──
const CART_KEY = 'quorbz_cart';

function getCart() {
  try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
  catch { return []; }
}

function saveCart(cart) {
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartBadge();
}

function addToCart(product, variant) {
  const cart = getCart();
  const key = String(product.id) + '|' + variant;
  const existing = cart.find(i => i.id === product.id && i.variant === variant);
  if (existing) {
    existing.qty = Math.min(existing.qty + 1, 5);
  } else {
    cart.push({
      id: product.id,
      title: product.title,
      category: product.category,
      emoji: product.emoji,
      price: midPrice(product.priceRange),
      priceRange: product.priceRange,
      variant: variant,
      qty: 1
    });
  }
  saveCart(cart);
}

function removeFromCart(id, variant) {
  let cart = getCart();
  cart = cart.filter(i => !(i.id === id && i.variant === variant));
  saveCart(cart);
  renderCartDrawer();
}

function getCartCount() {
  return getCart().reduce((s, i) => s + i.qty, 0);
}

function midPrice(priceRange) {
  if (!priceRange) return 0;
  const nums = priceRange.replace(/\$/g, '').split('-').map(Number);
  if (nums.length === 1) return nums[0];
  return (nums[0] + nums[1]) / 2;
}

function getCartTotal() {
  return getCart().reduce((s, i) => s + i.price * i.qty, 0);
}

function updateCartBadge() {
  const count = getCartCount();
  const badge = document.getElementById('cart-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count > 99 ? '99+' : count;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function renderCartDrawer() {
  const cart = getCart();
  const itemsEl = document.getElementById('cart-items');
  const footerEl = document.getElementById('cart-footer');
  const totalsEl = document.getElementById('cart-totals');

  if (!itemsEl) return;

  if (cart.length === 0) {
    itemsEl.innerHTML = `
      <div class="cart-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <p>Your cart is empty</p>
        <p style="font-size:12px">Add some digital goodies!</p>
      </div>`;
    if (footerEl) footerEl.style.display = 'none';
    return;
  }

  itemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-title">${item.title}</div>
        <div class="cart-item-meta">${item.variant} · qty ${item.qty}</div>
      </div>
      <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
      <button class="cart-item-remove" onclick="removeFromCart(${item.id}, '${item.variant}')" aria-label="Remove">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  `).join('');

  const total = getCartTotal();
  if (totalsEl) totalsEl.innerHTML = `
    <div class="cart-total-row"><span>Subtotal (${getCartCount()} items)</span><span>$${total.toFixed(2)}</span></div>
    <div class="cart-total-row"><span>Digital Delivery</span><span style="color:#4ade80">FREE</span></div>
    <div class="cart-total-row grand"><span>Total</span><span>$${total.toFixed(2)}</span></div>
  `;
  if (footerEl) footerEl.style.display = 'flex';
}

function openCart() {
  renderCartDrawer();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow = '';
}

// ── PICO CHAT ──
let picoOpen = false;

function toggleChat() {
  picoOpen = !picoOpen;
  document.getElementById('pico-panel').classList.toggle('open', picoOpen);
}

function picoQuick(text) {
  addPicoMsg(text, 'user');
  setTimeout(() => addPicoMsg(getBotReply(text), 'bot'), 600);
}

function picoSend() {
  const input = document.getElementById('pico-input');
  const text = input.value.trim();
  if (!text) return;
  addPicoMsg(text, 'user');
  input.value = '';
  setTimeout(() => addPicoMsg(getBotReply(text), 'bot'), 600);
}

function addPicoMsg(text, type) {
  const msgs = document.getElementById('pico-messages');
  const div = document.createElement('div');
  div.className = `pico-msg ${type}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (type === 'bot') {
    document.getElementById('pico-chips').style.display = 'none';
  }
}

function getBotReply(text) {
  const t = text.toLowerCase();
  if (t.includes('track') || t.includes('order')) return 'You can track your order by checking the confirmation email we sent you. Your download links will be there!';
  if (t.includes('refund') || t.includes('return')) return 'We offer refunds within 7 days if you\'re not satisfied. Just email hello@quorbz.com with your order number.';
  if (t.includes('product') || t.includes('question') || t.includes('format') || t.includes('file')) return 'All products are instant digital downloads in PDF, PNG, or compatible formats. No physical items shipped.';
  return 'Thanks for reaching out! We\'ll get back to you within 24 hours at hello@quorbz.com — or check our FAQ for instant answers.';
}

// ── STORE LOGIC ──
const CATEGORIES = ['All', 'Planners & Organizers', 'Google Sheets / Excel', 'Notion Templates', 'Canva Templates', 'Resume Templates', 'SVG Cut Files', 'Wall Art Printables', 'Invitations & Events', 'Educational Worksheets', 'Wellness & Lifestyle', 'AI & Digital Tools', '⭐ Quick Wins'];

let activeCategory = 'All';
let searchQuery = '';
let sortOrder = 'featured';

function getCompBadge(comp) {
  if (!comp) return '';
  const cls = { Low: 'badge-low', Medium: 'badge-med', High: 'badge-high', Med: 'badge-med' };
  const label = comp === 'Medium' ? 'Med' : comp;
  return `<span class="badge ${cls[comp] || 'badge-med'}">${label}</span>`;
}

function renderFilters() {
  const bar = document.getElementById('filters-bar');
  bar.innerHTML = CATEGORIES.map(cat => `
    <button class="cat-pill ${activeCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderFilters();
  renderGrid();
}

function getFilteredProducts() {
  if (typeof PRODUCTS === 'undefined') return [];
  let list = [...PRODUCTS];

  if (activeCategory !== 'All') {
    if (activeCategory === '⭐ Quick Wins') {
      list = list.filter(p => p.quickWin);
    } else {
      list = list.filter(p => p.category === activeCategory);
    }
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      (p.shortDescription || '').toLowerCase().includes(q)
    );
  }

  if (sortOrder === 'price-asc') {
    list.sort((a, b) => midPrice(a.priceRange) - midPrice(b.priceRange));
  } else if (sortOrder === 'price-desc') {
    list.sort((a, b) => midPrice(b.priceRange) - midPrice(a.priceRange));
  } else if (sortOrder === 'quick-wins') {
    list.sort((a, b) => (b.quickWin ? 1 : 0) - (a.quickWin ? 1 : 0));
  }

  return list;
}

function thumbBg(category) {
  if (typeof CATEGORY_COLORS !== 'undefined' && CATEGORY_COLORS[category]) return CATEGORY_COLORS[category];
  return 'linear-gradient(135deg, #1e3a5f, #0f172a)';
}

function renderGrid() {
  const grid = document.getElementById('product-grid');
  const countEl = document.getElementById('result-count');
  const products = getFilteredProducts();

  countEl.textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;

  if (products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>No products match your search.</p>
      </div>`;
    return;
  }

  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="card-thumb" style="background:#f8fafc;overflow:hidden;">
        ${generateMockupSVG(p)}
        <div class="card-badges">
          ${p.quickWin ? '<span class="badge badge-qw">Quick Win ⭐</span>' : ''}
          ${getCompBadge(p.competition)}
        </div>
      </div>
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-price">${p.priceRange}</div>
      </div>
      <div class="card-actions">
        <button class="btn-primary" id="atc-${p.id}" onclick="handleAddToCart(${p.id})">Add to Cart</button>
        <a href="/shop/product.html?id=${p.id}" class="btn-secondary">Details</a>
      </div>
    </div>
  `).join('');
}

function handleAddToCart(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) return;
  addToCart(product, 'print');
  const btn = document.getElementById(`atc-${productId}`);
  if (btn) {
    btn.textContent = 'Added! ✓';
    btn.classList.add('added');
    setTimeout(() => {
      btn.textContent = 'Add to Cart';
      btn.classList.remove('added');
    }, 1500);
  }
  openCart();
}

// Init
document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderGrid();
});

document.getElementById('sort-select').addEventListener('change', (e) => {
  sortOrder = e.target.value;
  renderGrid();
});

renderFilters();
renderGrid();
updateCartBadge();
</script>
</body>
</html>
